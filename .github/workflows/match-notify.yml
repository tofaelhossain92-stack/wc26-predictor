name: WC26 Match Automation

on:
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync live scores & settle finished matches
        run: |
          curl -s "https://wc26-predictor-pi.vercel.app/api/live-scores"

      - name: Notify upcoming matches (10 min warning)
        run: |
          curl -s -X POST "https://wc26-predictor-pi.vercel.app/api/cron/notify-upcoming" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
