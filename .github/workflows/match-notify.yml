name: Match Notifications

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check and notify upcoming matches
        run: |
          curl -s -X POST https://wc26-predictor-pi.vercel.app/api/cron/notify-upcoming \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
