  <circle cx="10" cy="38" r="10" fill="#8B5E3C" stroke="#5C3A1E" stroke-width="2"/>
  <circle cx="10" cy="38" r="6" fill="#CC9966"/>
  <circle cx="70" cy="38" r="10" fill="#8B5E3C" stroke="#5C3A1E" stroke-width="2"/>
  <circle cx="70" cy="38" r="6" fill="#CC9966"/>
  <!-- Face oval -->
