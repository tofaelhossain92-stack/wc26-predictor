  <line x1="22" y1="27" x2="22" y2="44" stroke="#8B5E3C" stroke-width="1.5"/>
  <line x1="26" y1="27" x2="26" y2="44" stroke="#8B5E3C" stroke-width="1.5"/>
  <line x1="50" y1="28" x2="50" y2="44" stroke="#8B5E3C" stroke-width="1.5"/>
  <line x1="54" y1="27" x2="54" y2="44" stroke="#8B5E3C" stroke-width="1.5"/>
  <line x1="58" y1="27" x2="58" y2="44" stroke="#8B5E3C" stroke-width="1.5"/>
  <!-- Mouth -->
  <path d="M 28 58 Q 40 66 52 58" stroke="#5C3A1E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nostrils -->
  <circle cx="36" cy="53" r="2.5" fill="#5C3A1E"/>
  <circle cx="44" cy="53" r="2.5" fill="#5C3A1E"/>
