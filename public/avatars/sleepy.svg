<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <circle cx="40" cy="40" r="36" fill="#C8A8E8"/>
  <circle cx="40" cy="40" r="36" fill="none" stroke="#9966CC" stroke-width="2"/>
  <!-- Sleep Zs -->
  <text x="52" y="16" font-size="10" fill="#9966CC" font-weight="bold">z</text>
  <text x="58" y="10" font-size="8" fill="#9966CC" font-weight="bold">z</text>
  <text x="63" y="5" font-size="6" fill="#9966CC" font-weight="bold">z</text>
  <!-- Half-closed eyes -->
  <circle cx="28" cy="38" r="8" fill="white"/>
  <circle cx="52" cy="38" r="8" fill="white"/>
  <path d="M 20 38 Q 28 42 36 38" fill="#C8A8E8"/>
  <path d="M 44 38 Q 52 42 60 38" fill="#C8A8E8"/>
  <!-- Pupils barely visible -->
  <circle cx="28" cy="40" r="3" fill="#553399"/>
  <circle cx="52" cy="40" r="3" fill="#553399"/>
  <!-- Drool line -->
  <path d="M 38 56 Q 36 62 38 68" stroke="#AAAADD" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="38" cy="69" r="3" fill="#AAAADD" opacity="0.7"/>
  <!-- Flat mouth -->
  <path d="M 30 54 Q 40 58 50 54" stroke="#9966CC" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Pillow/cheek blush -->
  <circle cx="18" cy="46" r="6" fill="rgba(200,150,220,0.5)"/>
  <circle cx="62" cy="46" r="6" fill="rgba(200,150,220,0.5)"/>
</svg>
